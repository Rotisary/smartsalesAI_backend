
services:

  backend:
    build: .
    command: uvicorn app.main:socket_app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://smartsales:secret@db:5432/smartsales
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/project
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    command: python -m celery -A app.celery_worker.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://smartsales:secret@db:5432/smartsales
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/project
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: ankane/pgvector:latest 
    environment:
      POSTGRES_USER:     smartsales
      POSTGRES_PASSWORD: secret
      POSTGRES_DB:       smartsales
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartsales"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data: